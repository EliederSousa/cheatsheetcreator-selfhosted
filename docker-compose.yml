services:
  cheatsheet-mongodb:
    image: mongo:latest
    container_name: cheatsheet-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - ./mount/mongo_data:/data/db

  cheatsheet-api:
    image: eliedersousa/cheatsheet-api:latest
    container_name: cheatsheet-api
    restart: unless-stopped
    ports:
      - "${API_PORT}:8080"
    depends_on:
      - cheatsheet-mongodb
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@cheatsheet-mongodb:27017/${MONGO_DATABASE}?authSource=admin
      API_KEY: ${API_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      RATE_LIMIT: ${RATE_LIMIT}